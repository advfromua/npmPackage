name: workflowNodeTest

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Extract code # pulling the code from the repository
        uses: actions/checkout@v6
      - name: Install Node.js # installing node
        uses: actions/setup-node@v6
        with:
          node-version: '18'
      - name: Install dependencies # installing dependencies
        run: npm ci
      - name: Run tests # running tests
        run: npm test

